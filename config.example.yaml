kubeconfig: ""

cluster: burst

bedrock_path: ""

# theme: auto

# cluster_create:
#   class: ""
#   worker_class: ""

pools:
  # namespace where the CAPI provider's MachineDeployments live; set to the chosen provider's namespace
  namespace: caph-system
  default_type: reserved
  version: v1.35.2+k3s1
  types:
    elastic: elastic-workers
    reserved: reserved-workers

# display-only; the in-cluster autoscaler owns scaling decisions
thresholds:
  burst: 0.80
  scale_down: 0.30
  window: 5
  cooldown_minutes: 10
  max_burst_nodes: 3
