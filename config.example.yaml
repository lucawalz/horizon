kubeconfig: ""

cluster: burst

bedrock_path: ""

pools:
  namespace: caph-system
  default_type: reserved
  types:
    elastic: elastic-workers
    reserved: reserved-workers

# display-only; the in-cluster autoscaler owns scaling decisions
thresholds:
  burst: 0.80
  scale_down: 0.30
  window: 5
  cooldown_minutes: 10
  max_burst_nodes: 3
