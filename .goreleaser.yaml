version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: horizon
    main: ./cmd/horizon
    binary: horizon
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/lucawalz/horizon/internal/version.version={{.Version}}

archives:
  - ids: [horizon]
    formats: [tar.gz]

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"
      - "^ci"
      - "^build"
      - "^style"
      - "^refactor"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug fixes
      regexp: '^fix'
      order: 1
    - title: Performance
      regexp: '^perf'
      order: 2
    - title: Others
      order: 999
