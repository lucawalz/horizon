version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: horizon
    main: ./cmd/horizon
    binary: horizon
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/lucawalz/horizon/internal/version.version={{.Version}}

  - id: horizon-controller
    main: ./cmd/horizon-controller
    binary: horizon-controller
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/lucawalz/horizon/internal/version.version={{.Version}}

archives:
  - ids: [horizon]
    formats: [tar.gz]

kos:
  - id: horizon-controller
    build: horizon-controller
    base_image: cgr.dev/chainguard/static
    repositories:
      - ghcr.io/lucawalz/horizon-controller
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Version }}"
      - latest
    bare: true

brews:
  - name: horizon
    repository:
      owner: lucawalz
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/lucawalz/horizon
    install: |
      bin.install "horizon"
    test: |
      system "#{bin}/horizon", "version"
